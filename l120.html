<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="https://tr.rbxcdn.com/180DAY-9e18e636081920f3200c2bcde222e529/150/150/Image/Png/noFilter" type="image/png">
  <title>Lobby 120</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:       #f5c832;
      --gold-deep:  #c88a00;
      --sky:        #4ab8f5;
      --sky-deep:   #1566c0;
      --bg-dark:    #0a0d1a;
      --bg-mid:     #0e1530;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-dark);
      color: #d8eaff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- background ---- */
    .bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 5%,  rgba(245,195,40,0.14)  0%, transparent 65%),
        radial-gradient(ellipse 55% 50% at 90% 90%, rgba(30,90,200,0.32)   0%, transparent 62%),
        radial-gradient(ellipse 80% 70% at 50% 45%, rgba(10,15,35,1)       0%, transparent 100%);
    }

    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(70px);
      animation: drift linear infinite;
    }
    .orb-1 { width:480px; height:480px; background:rgba(30,80,200,0.22);   top:-10%; left:-8%;  animation-duration:30s; }
    .orb-2 { width:340px; height:340px; background:rgba(20,60,180,0.28);   top:60%;  left:72%;  animation-duration:24s; animation-delay:-11s; }
    .orb-3 { width:260px; height:260px; background:rgba(245,190,30,0.1);   top:20%;  left:60%;  animation-duration:37s; animation-delay:-18s; }
    .orb-4 { width:200px; height:200px; background:rgba(70,170,245,0.14);  top:80%;  left:5%;   animation-duration:21s; animation-delay:-7s; }

    @keyframes drift {
      0%   { transform:translate(0,0) scale(1); }
      33%  { transform:translate(26px,-32px) scale(1.06); }
      66%  { transform:translate(-14px,18px) scale(0.96); }
      100% { transform:translate(0,0) scale(1); }
    }

    .grain {
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.035;
    }

    .particles { position: absolute; inset: 0; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform:translateY(105vh) translateX(0);   opacity:0; }
      8%   { opacity:1; }
      92%  { opacity:0.45; }
      100% { transform:translateY(-8vh) translateX(12px); opacity:0; }
    }

    /* ---- page ---- */
    .page {
      position: relative;
      z-index: 10;
      max-width: 820px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .back {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(180,210,255,0.32);
      text-decoration: none;
      margin-bottom: 3rem;
      transition: color 0.3s;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.1s forwards;
    }
    .back:hover { color: rgba(180,210,255,0.65); }

    /* ---- logo image ---- */
    .logo-wrap {
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1.3s ease 0.2s forwards;
    }
    .logo-wrap img {
      height: clamp(72px, 14vw, 110px);
      filter: drop-shadow(0 4px 18px rgba(245,195,40,0.35)) drop-shadow(0 4px 18px rgba(60,140,255,0.3));
      animation: bobble 5s ease-in-out infinite;
    }
    @keyframes bobble {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%       { transform: translateY(-7px) rotate(1deg); }
    }

    /* ---- title ---- */
    .hero-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 8vw, 5.4rem);
      line-height: 1.05;
      letter-spacing: 0.04em;
      margin-bottom: 2.4rem;
      opacity: 0;
      animation: fadeUp 1.3s ease 0.35s forwards;
    }

    .word-lobby {
      display: inline;
      background: linear-gradient(160deg, #ffe566 0%, #f5c832 40%, #c88a00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 12px rgba(245,195,40,0.5));
    }

    .word-120 {
      display: inline;
      background: linear-gradient(160deg, #a8dcff 0%, #4ab8f5 40%, #1566c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 12px rgba(74,184,245,0.55));
      margin-left: 0.18em;
    }

    /* ---- main screenshot ---- */
    .main-image-wrap {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1.4s ease 0.5s forwards;
      box-shadow:
        0 0 40px rgba(30,90,200,0.28),
        0 18px 55px rgba(5,8,20,0.75);
    }
    .main-image-wrap::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 18px;
      border: 1px solid rgba(180,220,255,0.1);
      pointer-events: none;
    }
    .main-image-wrap img {
      width: 100%;
      display: block;
      border-radius: 18px;
    }

    /* ---- description ---- */
    .description {
      font-size: clamp(0.92rem, 2vw, 1.05rem);
      font-weight: 300;
      line-height: 1.88;
      color: rgba(190, 215, 255, 0.72);
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1.4s ease 0.65s forwards;
    }

    .hl-lobby {
      font-family: 'Fredoka One', cursive;
      font-size: 1.05em;
      background: linear-gradient(120deg, #ffe566 0%, #f5c832 60%, #c88a00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hl-120 {
      font-family: 'Fredoka One', cursive;
      font-size: 1.05em;
      background: linear-gradient(120deg, #a8dcff 0%, #4ab8f5 60%, #1566c0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ---- play button ---- */
    .play-wrap {
      opacity: 0;
      animation: fadeUp 1.4s ease 0.8s forwards;
    }
    .btn-play {
      display: inline-block;
      padding: 1rem 2.8rem;
      border-radius: 100px;
      background: linear-gradient(135deg, #4ab8f5 0%, #1d7fd4 50%, #0d4fa0 100%);
      color: #e8f5ff;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 26px rgba(30,110,220,0.45),
        0 6px 24px rgba(5,15,50,0.65),
        inset 0 1px 0 rgba(255,255,255,0.18);
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.38s ease;
    }
    .btn-play::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
      transform: translateX(-110%);
      transition: transform 0.6s ease;
    }
    .btn-play:hover::before { transform: translateX(110%); }
    .btn-play::after {
      content: '';
      position: absolute; inset:1px;
      border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.15);
      pointer-events: none;
    }
    .btn-play:hover {
      transform: translateY(-3px) scale(1.025);
      box-shadow: 0 0 42px rgba(60,150,240,0.6), 0 10px 34px rgba(5,15,50,0.75), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .btn-play:active { transform: scale(0.97); }

    /* ---- footer ---- */
    .footer {
      margin-top: 5rem;
      text-align: center;
    }
    .footer-rule {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,215,255,0.22), transparent);
      margin: 0 auto 1.2rem;
    }
    .footer-note {
      font-size: 0.67rem;
      font-style: italic;
      font-family: 'Nunito', sans-serif;
      color: rgba(180,215,255,0.16);
      letter-spacing: 0.1em;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
