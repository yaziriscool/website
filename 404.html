<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Nunito:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: 'Cormorant Garamond', serif;
      cursor: none;
    }

    /* ---- background void ---- */
    .bg { position: fixed; inset: 0; z-index: 0; }

    .bg-base {
      position: absolute; inset: 0;
      background: #000;
    }

    /* breathing red core — very slow, very deep */
    .bg-pulse {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 55% 45% at 50% 58%, rgba(90,0,0,0.7) 0%, rgba(30,0,0,0.3) 45%, transparent 75%);
      animation: voidBreathe 11s ease-in-out infinite;
    }
    @keyframes voidBreathe {
      0%,100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.12); }
    }

    /* outer darkness creeping in */
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 20%, rgba(0,0,0,0.85) 70%, #000 100%);
      animation: vignetteBreath 14s ease-in-out infinite;
    }
    @keyframes vignetteBreath {
      0%,100% { opacity: 0.85; }
      50%      { opacity: 1; }
    }

    /* film grain — always moving */
    .grain {
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 160px 160px;
      opacity: 0.055;
      pointer-events: none;
      animation: grainDrift 0.15s steps(1) infinite;
    }
    @keyframes grainDrift {
      0%  { background-position: 0 0; }
      25% { background-position: -28px 18px; }
      50% { background-position: 14px -22px; }
      75% { background-position: -9px 28px; }
    }

    /* scanlines */
    .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.12) 3px,
        rgba(0,0,0,0.12) 4px
      );
      pointer-events: none;
    }

    /* slow red fog wisps drifting */
    .fog {
      position: absolute; inset: -20%;
      background:
        radial-gradient(ellipse 30% 20% at 20% 70%, rgba(100,0,0,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 25% 18% at 75% 30%, rgba(80,0,0,0.14) 0%, transparent 70%);
      animation: fogDrift 28s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes fogDrift {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 0.6; }
      50%  { transform: translate(30px,-20px) rotate(2deg); opacity: 1; }
      100% { transform: translate(-20px,15px) rotate(-1.5deg); opacity: 0.7; }
    }

    /* drip canvas */
    .drips { position: absolute; inset: 0; pointer-events: none; }

    /* ---- content ---- */
    .content {
      position: fixed; inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
    }

    .four-o-four {
      font-family: 'Nunito', sans-serif;
      font-weight: 200;
      font-size: clamp(7rem, 20vw, 16rem);
      letter-spacing: 0.1em;
      line-height: 1;
      /* starts near-invisible, very slowly breathes into slight visibility */
      color: #fff;
      animation: numBreathe 18s ease-in-out infinite;
    }
    @keyframes numBreathe {
      0%,100% { opacity: 0.04; text-shadow: none; }
      50%      { opacity: 0.09; text-shadow: 0 0 80px rgba(160,0,0,0.5); }
    }

    .sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.78rem, 1.8vw, 1rem);
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.1);
      margin-top: 0.8rem;
      animation: subBreathe 22s ease-in-out infinite;
    }
    @keyframes subBreathe {
      0%,100% { opacity: 0.4; }
      40%      { opacity: 0.1; }
      60%      { opacity: 0.7; }
    }

    /* ---- SHAME bottom left ---- */
    .shame {
      position: fixed;
      bottom: 2.4rem;
      left: 2.6rem;
      z-index: 30;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      letter-spacing: 0.05em;
      /* gradient red, slowly breathing glow */
      background: linear-gradient(150deg, #cc1100 0%, #7a0000 55%, #2a0000 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(160,0,0,0.55));
      animation: shameBreathe 16s ease-in-out infinite;
      pointer-events: none;
      user-select: none;
    }
    @keyframes shameBreathe {
      0%,100% { opacity: 0.55; filter: drop-shadow(0 0 8px rgba(160,0,0,0.4)); }
      30%      { opacity: 0.3;  filter: drop-shadow(0 0 4px rgba(100,0,0,0.2)); }
      65%      { opacity: 0.85; filter: drop-shadow(0 0 22px rgba(200,0,0,0.75)); }
    }

    /* ---- back link ---- */
    .back-link {
      position: fixed;
      top: 2rem; left: 2.6rem;
      z-index: 30;
      font-family: 'Nunito', sans-serif;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.1);
      text-decoration: none;
      pointer-events: all;
      transition: color 1.2s ease;
    }
    .back-link:hover { color: rgba(160,0,0,0.6); }

    /* ---- custom cursor ---- */
    .cursor {
      position: fixed;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(160,0,0,0.75);
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 10px rgba(180,0,0,0.8), 0 0 24px rgba(120,0,0,0.4);
      transition: left 0.06s linear, top 0.06s linear;
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <div class="bg">
    <div class="bg-base"></div>
    <div class="fog"></div>
    <div class="bg-pulse"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="grain"></div>
    <canvas class="drips" id="drips"></canvas>
  </div>

  <div class="content">
    <p class="four-o-four">404</p>
    <p class="sub">this place doesn't exist</p>
  </div>

  <p class="shame">Shame...</p>
  <a href="/" class="back-link">← return</a>

  <script>
    // cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // canvas drips — slow, smooth, creeping from top
    const canvas = document.getElementById('drips');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const drips = [];

    function spawnDrip() {
      drips.push({
        x:     Math.random() * canvas.width,
        y:     0,
        speed: 0.18 + Math.random() * 0.38,
        len:   60  + Math.random() * 180,
        width: 1   + Math.random() * 2.2,
        alpha: 0.35 + Math.random() * 0.45,
        tail:  [],
      });
    }

    // seed a few at start
    for (let i = 0; i < 5; i++) {
      const d = {
        x:     Math.random() * (window.innerWidth || 800),
        y:     Math.random() * 300,
        speed: 0.18 + Math.random() * 0.38,
        len:   60  + Math.random() * 180,
        width: 1   + Math.random() * 2.2,
        alpha: 0.35 + Math.random() * 0.45,
        tail:  [],
      };
      drips.push(d);
    }

    setInterval(spawnDrip, 2200);

    function drawDrips() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = drips.length - 1; i >= 0; i--) {
        const d = drips[i];
        d.y += d.speed;
        d.tail.push(d.y);
        if (d.tail.length > d.len) d.tail.shift();

        if (d.tail.length < 2) continue;

        const grad = ctx.createLinearGradient(d.x, d.tail[0], d.x, d.tail[d.tail.length-1]);
        grad.addColorStop(0,   `rgba(120,0,0,${d.alpha})`);
        grad.addColorStop(0.6, `rgba(80,0,0,${d.alpha * 0.6})`);
        grad.addColorStop(1,   `rgba(40,0,0,0)`);

        ctx.beginPath();
        ctx.moveTo(d.x, d.tail[0]);
        for (let j = 1; j < d.tail.length; j++) {
          ctx.lineTo(d.x, d.tail[j]);
        }
        ctx.strokeStyle = grad;
        ctx.lineWidth   = d.width;
        ctx.lineCap     = 'round';
        ctx.stroke();

        // bulb at tip
        const tipY = d.tail[d.tail.length - 1];
        ctx.beginPath();
        ctx.arc(d.x, tipY, d.width * 1.4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(100,0,0,${d.alpha * 0.8})`;
        ctx.fill();

        if (d.y > canvas.height + 20) drips.splice(i, 1);
      }

      requestAnimationFrame(drawDrips);
    }
    drawDrips();

    // very slow, very gentle world breathe via JS
    let t = 0;
    function worldBreathe() {
      t += 0.003;
      const scale = 1 + Math.sin(t) * 0.003;
      document.querySelector('.content').style.transform = `scale(${scale})`;
      requestAnimationFrame(worldBreathe);
    }
    worldBreathe();
  </script>

</body>
</html>
