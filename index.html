<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevator Game 64</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --lavender:    #d4b8f0;
      --darkest:     #160928;
    }

    html, body { width: 100%; height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--darkest);
      color: var(--lavender);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .bg { position: fixed; inset: 0; z-index: 0; }

    .bg-gradient {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 75% 55% at 15% 8%,  rgba(130,55,200,0.42) 0%, transparent 68%),
        radial-gradient(ellipse 55% 50% at 85% 85%, rgba(75,25,135,0.48)  0%, transparent 65%),
        radial-gradient(ellipse 90% 70% at 50% 50%, rgba(22,9,40,1)       0%, transparent 100%);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(65px);
      animation: drift linear infinite;
    }
    .orb-1 { width:500px; height:500px; background:rgba(110,45,185,0.32);  top:-12%; left:-10%; animation-duration:30s; }
    .orb-2 { width:320px; height:320px; background:rgba(65,18,120,0.38);   top:58%;  left:72%;  animation-duration:23s; animation-delay:-9s; }
    .orb-3 { width:260px; height:260px; background:rgba(165,80,230,0.22);  top:28%;  left:48%;  animation-duration:36s; animation-delay:-17s; }
    .orb-4 { width:200px; height:200px; background:rgba(200,120,255,0.15); top:78%;  left:8%;   animation-duration:20s; animation-delay:-6s; }

    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(28px,-38px) scale(1.07); }
      66%  { transform: translate(-18px,22px) scale(0.96); }
      100% { transform: translate(0,0) scale(1); }
    }

    .grain {
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.04;
      pointer-events: none;
    }

    .particles { position: absolute; inset: 0; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(210,175,245,0.55);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(105vh) translateX(0);   opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.5; }
      100% { transform: translateY(-8vh) translateX(15px); opacity: 0; }
    }

    /* stage */
    .stage {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      animation: fadeIn 2.4s ease 0.1s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-img {
      width: clamp(88px, 15vw, 128px);
      margin-bottom: 1.8rem;
      border-radius: 18px;
      filter: drop-shadow(0 0 22px rgba(180,100,255,0.55));
      animation: bobble 5s ease-in-out infinite;
    }

    @keyframes bobble {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }

    .eyebrow {
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(210,175,245,0.36);
      margin-bottom: 0.9rem;
    }

    .title {
      font-size: clamp(1.9rem, 5.2vw, 3.4rem);
      font-weight: 200;
      letter-spacing: 0.2em;
      line-height: 1.2;
      background: linear-gradient(140deg, #f0dcff 0%, #c090ef 35%, #8a4fc8 70%, #d4b8f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .dev-tag {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.88rem;
      font-weight: 300;
      color: rgba(200,155,240,0.42);
      letter-spacing: 0.1em;
      margin-bottom: 3.4rem;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      width: 100%;
      max-width: 295px;
    }

    .btn {
      position: relative;
      display: block;
      width: 100%;
      padding: 0.95rem 2rem;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-decoration: none;
      overflow: hidden;
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.38s ease;
    }

    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.16) 50%, transparent 70%);
      transform: translateX(-110%);
      transition: transform 0.6s ease;
      border-radius: inherit;
    }
    .btn:hover::before { transform: translateX(110%); }

    .btn::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.13);
      pointer-events: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #a066d8 0%, #6b30a2 50%, #45197a 100%);
      color: #eedcff;
      box-shadow: 0 0 22px rgba(140,65,210,0.4), 0 5px 22px rgba(50,8,90,0.55), inset 0 1px 0 rgba(255,255,255,0.13);
    }
    .btn-primary:hover {
      transform: translateY(-3px) scale(1.022);
      box-shadow: 0 0 38px rgba(160,85,230,0.6), 0 10px 32px rgba(50,8,90,0.65), inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #5a2880 0%, #391060 50%, #220944 100%);
      color: #c8a9e8;
      box-shadow: 0 0 16px rgba(90,35,140,0.32), 0 4px 16px rgba(25,5,55,0.5), inset 0 1px 0 rgba(255,255,255,0.09);
    }
    .btn-secondary:hover {
      transform: translateY(-3px) scale(1.022);
      box-shadow: 0 0 28px rgba(110,55,175,0.48), 0 8px 24px rgba(25,5,55,0.6), inset 0 1px 0 rgba(255,255,255,0.13);
    }

    .btn:active { transform: translateY(0) scale(0.97); }

    .rule {
      width: 50px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(210,175,245,0.32), transparent);
      margin: 3rem auto 0;
    }

    .footer-note {
      margin-top: 1.1rem;
      font-size: 0.67rem;
      font-style: italic;
      color: rgba(210,175,245,0.18);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="grain"></div>
    <div class="particles" id="particles"></div>
  </div>

  <div class="stage">
    <img class="logo-img" src="https://i.imgur.com/PJhQ36z.png" alt="Elevator Game 64" />
    <p class="eyebrow">Welcome</p>
    <h1 class="title">Elevator Game 64</h1>
    <p class="dev-tag">0.4 is in development</p>

    <div class="btn-group">
      <a href="https://ele64.com/eg64" class="btn btn-primary">Elevator Game 64</a>
      <a href="https://ele64.com/l120" class="btn btn-secondary">Lobby 120</a>
    </div>

    <div class="rule"></div>
    <p class="footer-note">something is coming</p>
  </div>

  <script>
    const container = document.getElementById('particles');
    for (let i = 0; i < 42; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 2.8 + 0.8;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${13 + Math.random()*22}s;
        animation-delay:${-Math.random()*28}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
